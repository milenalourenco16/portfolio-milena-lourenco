<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Milena Lourenço</title>

    <!-- Arquivo de estilos CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <!-- Cabeçalho com logo e menu de navegação -->
    <header>
        <nav>
            <div class="logo">
                <h1>MILENA LOURENÇO</h1>
            </div>

            <!-- Menu principal do site -->
            <ul id="menu">
                <li><a href="index.html">Sobre Mim</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
            
        </nav>

        
    </header>

    <main>

        <!-- Seção de contato -->
        <section id="contato">
            <h1>Contato</h1>

            <p>Caso deseje entrar em contato, preencha o formulário abaixo.</p>
        </section>

        <!-- Formulário de contato com validação em JavaScript -->
        <form id="formContato">

            <label for="nome">Nome: </label>
            <input type="text" id="nome">

            <label for="email">E-mail: </label>
            <input type="email" id="email">

            <label for="mensagem">Mensagem: </label>
            <textarea id="mensagem" rows="5"></textarea>

            <!-- Botão para envio do formulário -->
            <button type="submit">Enviar Mensagem</button>
        </form>
    </main>
    
    <!-- Arquivp JavaScrip responsável pela validação e interações -->
    <script src="js/script.js"></script>
</body>
</html>
